#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - maven
  - openjdk-21-jdk
  - nginx

runcmd:
  - mkdir -p /opt/linker1
  - mkdir -p /var/lib/linker1
  - mkdir -p /var/www/linker1
  - git clone ${repo_url} /home/ubuntu/linker1
  - cd /home/ubuntu/linker1 && mvn clean package
  - >
    JAR_FILE=$(find /home/ubuntu/linker1/target -name '*-jar-with-dependencies.jar' | head -n 1) &&
    cp "$JAR_FILE" /opt/linker1/linker1.jar
  - chown -R ubuntu:ubuntu /opt/linker1
  - chown -R ubuntu:ubuntu /var/lib/linker1
  - cp -r /home/ubuntu/linker1/public/* /var/www/linker1/
  - chown -R www-data:www-data /var/www/linker1
  - |
    cat > /etc/systemd/system/linker1.service << 'INNEREOF'
    [Unit]
    Description=Linker1 URL Shortener
    After=network.target

    [Service]
    Type=simple
    WorkingDirectory=/opt/linker1
    ExecStart=/usr/bin/java -jar /opt/linker1/linker1.jar
    Restart=always
    RestartSec=5
    User=ubuntu
    Environment="LINKER_PORT=8080"
    Environment="LINKER_DB_PATH=/var/lib/linker1/linker1.db"

    [Install]
    WantedBy=multi-user.target
    INNEREOF
  - rm -f /etc/nginx/sites-enabled/default
  - |
    cat > /etc/nginx/sites-available/linker1 << 'INNEREOF'
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    INNEREOF
  - ln -sf /etc/nginx/sites-available/linker1 /etc/nginx/sites-enabled/linker1
  - nginx -t
  - systemctl daemon-reload
  - systemctl enable linker1.service
  - systemctl restart linker1.service
  - systemctl restart nginx