name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Show build context
        run: |
          echo "Paso 1 terminado: repositorio listo"
          java -version
          mvn -version

      - name: Compile sources
        run: |
          mvn -B -ntp compile
          echo "Paso 2 terminado: compilación completada"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: |
          mvn -B -ntp test
          echo "Paso 3 terminado: pruebas unitarias completadas"

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build application package
        run: |
          mvn -B -ntp package -DskipTests
          echo "Paso 4 terminado: artefacto empaquetado"

      - name: Upload packaged jar
        uses: actions/upload-artifact@v4
        with:
          name: linker1-jar
          path: target/linker1-1.0-jar-with-dependencies.jar

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download packaged jar
        uses: actions/download-artifact@v4
        with:
          name: linker1-jar

      - name: Confirm pipeline completion
        run: |
          ls -lah
          test -f linker1-1.0-jar-with-dependencies.jar
          echo "Paso 5 terminado: build, pruebas y empaquetado completados"