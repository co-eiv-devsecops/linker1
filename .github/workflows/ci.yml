name: CI

on:
  push:
    branches:
      - DEV
      - main
      - master
  pull_request:
    branches:
      - DEV
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github

      - name: Show build context
        run: |
          echo "Paso 1 terminado: repositorio listo"
          java -version
          mvn -version

      - name: Compile sources
        run: |
          mvn -B -ntp compile
          echo "Paso 2 terminado: compilación completada"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github

      - name: Run unit tests
        run: |
          mvn -B -ntp test
          echo "Paso 3 terminado: pruebas unitarias completadas"

      - name: Check coverage threshold
        run: mvn -B -ntp verify -DskipTests

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github

      - name: Build application package
        run: |
          mvn -B -ntp package -DskipTests
          echo "Paso 4 terminado: artefacto empaquetado"

      - name: Add Linux launcher script
        run: |
          cp scripts/linker1 target/linker1
          chmod +x target/linker1

      - name: Upload packaged jar
        uses: actions/upload-artifact@v4
        with:
          name: linker1-jar
          path: |
            target/linker1-1.0-jar-with-dependencies.jar
            target/linker1

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download packaged jar
        uses: actions/download-artifact@v4
        with:
          name: linker1-jar

      - name: Confirm pipeline completion
        run: |
          chmod +x linker1
          ls -lah
          test -f linker1-1.0-jar-with-dependencies.jar
          test -x linker1
          echo "Paso 5 terminado: build, pruebas y empaquetado completados"

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github

      - name: Download packaged jar
        uses: actions/download-artifact@v4
        with:
          name: linker1-jar

      - name: Start app
        run: |
          chmod +x linker1
          LINKER_PORT=8080 ./linker1 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/ > /dev/null && break
            sleep 1
          done

      - name: Smoke test static routes
        run: |
          curl -sf http://localhost:8080/ > /dev/null
          curl -sf http://localhost:8080/app.js > /dev/null
          curl -sf http://localhost:8080/styles.css > /dev/null

      - name: Smoke test create + redirect
        run: |
          ID=$(curl -sf -X POST http://localhost:8080/link \
            -H "Content-Type: application/json" \
            -d '{"url":"https://example.com"}')
          echo "Created id: $ID"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/$ID)
          test "$STATUS" = "301"
          LOCATION=$(curl -s -D - -o /dev/null http://localhost:8080/$ID | grep -i '^location:' | tr -d '\r')
          echo "$LOCATION" | grep -q "https://example.com"

      - name: Smoke test alias create + redirect + conflict
        run: |
          curl -sf -X POST http://localhost:8080/link \
            -H "Content-Type: application/json" \
            -d '{"url":"https://example.org","alias":"ci-smoke-alias"}' > /dev/null
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ci-smoke-alias)
          test "$STATUS" = "301"
          CONFLICT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/link \
            -H "Content-Type: application/json" \
            -d '{"url":"https://other.example.org","alias":"ci-smoke-alias"}')
          test "$CONFLICT_STATUS" = "409"

      - name: Smoke test 404 for unknown id
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/does-not-exist-xyz)
          test "$STATUS" = "404"

  api-tests:
    name: API Tests (Live)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/DEV' )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Newman against the live instance
        run: |
          npx --yes newman run postman/linker1.postman_collection.json \
            --env-var "baseUrl=https://1.n-la-c.app" \
            --reporters cli,junit --reporter-junit-export newman-report.xml

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.xml
  publish-package:
    name: Publish GitHub Package
    runs-on: ubuntu-latest
    needs:
      - package
      - smoke
      - api-tests

    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/DEV')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish package
        run: mvn -B deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}