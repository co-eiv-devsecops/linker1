name: Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build application package
        run: mvn -B -ntp package -DskipTests

      - name: Upload packaged jar
        uses: actions/upload-artifact@v4
        with:
          name: linker-app
          path: target/linker1-1.0-jar-with-dependencies.jar

  deploy-prod:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    needs: Build
    runs-on: ubuntu-latest

    environment:
      name: prod

    env:
      DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
      DEPLOYMENT_PUBLIC_KEY: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}
      OCI_BASTION_OCID: ${{ vars.OCI_BASTION_OCID }}

    steps:
      - name: Base64-encode secrets for safe transport into the remote script
        id: b64
        run: |
          b64() { printf '%s' "$1" | base64 -w0; }
          {
            echo "ld_sdk_key=$(b64 "${{ secrets.LD_SDK_KEY }}")"
            echo "otel_endpoint=$(b64 "${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}")"
            echo "otel_headers=$(b64 "${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}")"
            echo "mysql_host=$(b64 "${{ vars.MYSQL_HOST }}")"
            echo "mysql_database=$(b64 "${{ vars.MYSQL_DATABASE }}")"
            echo "mysql_user=$(b64 "${{ vars.MYSQL_USER }}")"
            echo "mysql_pwd=$(b64 "${{ secrets.MYSQL_PWD }}")"
            echo "log_level=$(b64 "${{ vars.LOG_LEVEL != '' && vars.LOG_LEVEL || 'INFO' }}")"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy via OCI Bastion
        uses: co-eiv-devsecops/material-curso/actions/oci-bastion-deploy@main
        with:
          instance-id: ${{ vars.OCI_INSTANCE_OCID }}
          artifact-name: linker-app
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu
          oci-cli-cache-version: v1
          # Every secret/variable below arrives base64-encoded (see the step above) and is
          # decoded back to its real value only inside the remote script, never spliced as
          # raw text into this YAML. `${{ }}` substitution happens before this script ever
          # reaches the target VM, so a raw secret containing a quote, `$`, backtick, or the
          # literal placeholder text from the course material (e.g. "<ponga_su_token>") would
          # otherwise be interpreted as shell syntax on the remote end -- exactly what broke
          # the previous deploy (OTEL_EXPORTER_OTLP_HEADERS still held that placeholder).
          script: |
            set -euo pipefail

            LD_SDK_KEY=$(printf '%s' "${{ steps.b64.outputs.ld_sdk_key }}" | base64 -d)
            OTEL_EXPORTER_OTLP_ENDPOINT=$(printf '%s' "${{ steps.b64.outputs.otel_endpoint }}" | base64 -d)
            OTEL_EXPORTER_OTLP_HEADERS=$(printf '%s' "${{ steps.b64.outputs.otel_headers }}" | base64 -d)
            MYSQL_HOST=$(printf '%s' "${{ steps.b64.outputs.mysql_host }}" | base64 -d)
            MYSQL_DATABASE=$(printf '%s' "${{ steps.b64.outputs.mysql_database }}" | base64 -d)
            MYSQL_USER=$(printf '%s' "${{ steps.b64.outputs.mysql_user }}" | base64 -d)
            MYSQL_PWD=$(printf '%s' "${{ steps.b64.outputs.mysql_pwd }}" | base64 -d)
            LOG_LEVEL=$(printf '%s' "${{ steps.b64.outputs.log_level }}" | base64 -d)

            # systemd's unit-file parser treats a bare "%" in any directive as the start
            # of a specifier (%h, %n, etc.) and a bare '"' inside a quoted assignment as
            # the end of the value -- both are real characters a Grafana Cloud token or
            # password can legitimately contain. Escaping "%" -> "%%" and '"' -> '\"'
            # here is what actually crashed the previous two deploys: a literal "%" in
            # OTEL_EXPORTER_OTLP_HEADERS made systemd reject the unit, so the service
            # never came back up even though this script itself ran to completion.
            systemd_escape_value() {
              printf '%s' "$1" | sed -e 's/%/%%/g' -e 's/"/\\"/g'
            }
            LD_SDK_KEY=$(systemd_escape_value "$LD_SDK_KEY")
            OTEL_EXPORTER_OTLP_ENDPOINT=$(systemd_escape_value "$OTEL_EXPORTER_OTLP_ENDPOINT")
            OTEL_EXPORTER_OTLP_HEADERS=$(systemd_escape_value "$OTEL_EXPORTER_OTLP_HEADERS")
            MYSQL_HOST=$(systemd_escape_value "$MYSQL_HOST")
            MYSQL_DATABASE=$(systemd_escape_value "$MYSQL_DATABASE")
            MYSQL_USER=$(systemd_escape_value "$MYSQL_USER")
            MYSQL_PWD=$(systemd_escape_value "$MYSQL_PWD")
            LOG_LEVEL=$(systemd_escape_value "$LOG_LEVEL")

            JAR_SRC=$(find "$DEPLOY_PATH" -maxdepth 1 -name '*.jar' | head -n 1)

            sudo mkdir -p /opt/linker1
            sudo mkdir -p /var/lib/linker1
            sudo cp "$JAR_SRC" /opt/linker1/linker1.jar
            sudo chown -R ubuntu:ubuntu /opt/linker1
            sudo chown -R ubuntu:ubuntu /var/lib/linker1

            sudo systemctl stop linker1.service || true

            sudo tee /etc/systemd/system/linker1.service > /dev/null <<EOF
            [Unit]
            Description=Linker1 URL Shortener
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/opt/linker1
            ExecStart=/usr/bin/java -jar /opt/linker1/linker1.jar
            Restart=always
            RestartSec=5
            User=ubuntu
            Environment="LINKER_PORT=8080"
            Environment="LINKER_DB_PATH=/var/lib/linker1/linker1.db"
            Environment="LD_SDK_KEY=$LD_SDK_KEY"
            Environment="OTEL_SERVICE_NAME=linker1"
            Environment="OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf"
            Environment="LOG_LEVEL=$LOG_LEVEL"
            EOF

            # These are optional -- appended only when a real value is configured, since
            # the OTel SDK refuses to start if OTEL_EXPORTER_OTLP_ENDPOINT is present but
            # empty, and an empty MySQL var would otherwise silently overwrite a working
            # value with a blank one on every deploy.
            add_env_if_set() {
              local name="$1" value="$2"
              if [ -n "$value" ]; then
                echo "Environment=\"$name=$value\"" | sudo tee -a /etc/systemd/system/linker1.service > /dev/null
              fi
            }
            add_env_if_set OTEL_EXPORTER_OTLP_ENDPOINT "$OTEL_EXPORTER_OTLP_ENDPOINT"
            add_env_if_set OTEL_EXPORTER_OTLP_HEADERS "$OTEL_EXPORTER_OTLP_HEADERS"
            add_env_if_set MYSQL_HOST "$MYSQL_HOST"
            add_env_if_set MYSQL_DATABASE "$MYSQL_DATABASE"
            add_env_if_set MYSQL_USER "$MYSQL_USER"
            add_env_if_set MYSQL_PWD "$MYSQL_PWD"

            sudo tee -a /etc/systemd/system/linker1.service > /dev/null <<EOF

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable linker1.service
            sudo systemctl restart linker1.service

            sleep 5
            if ! systemctl is-active --quiet linker1.service; then
              echo "::error::linker1.service is not active after restart -- dumping diagnostics"
              sudo systemctl status linker1.service --no-pager -l || true
              echo "--- systemd-analyze verify ---"
              sudo systemd-analyze verify /etc/systemd/system/linker1.service || true
              echo "--- last 100 log lines ---"
              sudo journalctl -u linker1.service --no-pager -n 100 || true
              exit 1
            fi

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
            if [ "$STATUS" != "200" ]; then
              echo "::error::GET / returned $STATUS instead of 200 -- dumping diagnostics"
              sudo systemctl status linker1.service --no-pager -l || true
              echo "--- last 100 log lines ---"
              sudo journalctl -u linker1.service --no-pager -n 100 || true
              exit 1
            fi

            HEALTHZ_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
            echo "Healthcheck status: $HEALTHZ_STATUS (non-blocking -- MySQL may not be configured for this environment yet)"
  validate-prod:
    name: Validate Production
    needs: deploy-prod
    runs-on: ubuntu-latest

    steps:
      - name: Smoke test production (read-only)
        run: |
          BASE="https://1.n-la-c.app"

          curl -sf "$BASE/" > /dev/null
          curl -sf "$BASE/app.js" > /dev/null
          curl -sf "$BASE/styles.css" > /dev/null

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/does-not-exist-xyz")
          test "$STATUS" = "404"

  rollback:
    name: Rollback
    if: failure()
    needs: [deploy-prod, validate-prod]
    runs-on: ubuntu-latest

    environment:
      name: prod

    env:
      DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
      DEPLOYMENT_PUBLIC_KEY: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}
      OCI_BASTION_OCID: ${{ vars.OCI_BASTION_OCID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve previous stable tag
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$CURRENT_TAG" ]; then
            echo "No published tags found; cannot determine the previous version."
            exit 1
          fi

          PREVIOUS_TAG=$(git tag -l 'v*.*.*' --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            echo "No version prior to $CURRENT_TAG exists to roll back to."
            exit 1
          fi

          echo "Current version: $CURRENT_TAG"
          echo "Rollback version: $PREVIOUS_TAG"
          echo "tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      # deploy-prod deploys a prebuilt jar straight to /opt/linker1 through the bastion
      # and never touches a persistent git checkout on the VM, so /home/ubuntu/linker1
      # (only created once, by cloud-init, on first boot) is not a reliable rollback
      # source -- it drifts out of date and rollback.sh living there can be missing
      # entirely on older VMs. Instead, pull the previous tag's own released jar
      # (published by release.yml) and redeploy it the same way deploy-prod deploys
      # the new one: as a GitHub Actions artifact fed to oci-bastion-deploy.
      - name: Download previous release jar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p rollback-artifact
          gh release download "${{ steps.previous.outputs.tag }}" \
            --pattern 'linker1-1.0-jar-with-dependencies.jar' \
            --dir rollback-artifact --clobber

      - name: Upload previous release jar as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: linker-app-rollback
          path: rollback-artifact/linker1-1.0-jar-with-dependencies.jar

      - name: Rollback via OCI Bastion
        uses: co-eiv-devsecops/material-curso/actions/oci-bastion-deploy@main
        with:
          instance-id: ${{ vars.OCI_INSTANCE_OCID }}
          artifact-name: linker-app-rollback
          target-path: /tmp/deploy/linker/rollback-${{ github.sha }}
          target-os-username: ubuntu
          oci-cli-cache-version: v1
          script: |
            set -euo pipefail

            JAR_SRC=$(find "$DEPLOY_PATH" -maxdepth 1 -name '*.jar' | head -n 1)

            sudo cp "$JAR_SRC" /opt/linker1/linker1.jar
            sudo chown -R ubuntu:ubuntu /opt/linker1

            sudo systemctl restart linker1.service

            sleep 3
            systemctl is-active --quiet linker1.service

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
            test "$STATUS" = "200"

      - name: Verify rollback
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://1.n-la-c.app/" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "The service did not respond correctly after the rollback (status: $STATUS)."
            exit 1
          fi
          echo "Rollback verified: the service responds 200 on ${{ steps.previous.outputs.tag }}."
