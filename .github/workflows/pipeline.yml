name: Deployment Pipeline

on:
  push:
    branches:
      - DEV
      - main
  workflow_dispatch:

jobs:
  deploy-dev:
    name: Deploy to Development
    if: github.ref == 'refs/heads/DEV'
    runs-on: ubuntu-latest

    environment:
      name: dev

    steps:
      - name: Deploy to Development
        run: |
          echo "=== DEVELOPMENT DEPLOYMENT ==="
          echo "Deploying application to Development environment..."
          echo "Deployment completed successfully."

  validate-dev:
    name: Validate Development
    if: github.ref == 'refs/heads/DEV'
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: Run smoke tests
        run: |
          echo "Running smoke tests in Development..."
          echo "All tests passed."

  deploy-prod:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: prod

    steps:
      - name: Deploy to Production
        run: |
          echo "=== PRODUCTION DEPLOYMENT ==="
          echo "Promoting validated artifact to Production..."
          echo "Waiting for GitHub Environment approval..."
          echo "Production deployment completed successfully."

  rollback:
    name: Rollback
    if: failure()
    needs: deploy-prod
    runs-on: ubuntu-latest

    steps:
      - name: Rollback to previous version
        run: |
          echo "Production deployment failed."
          echo "Rolling back to the previous stable version..."
          echo "Rollback completed successfully."
