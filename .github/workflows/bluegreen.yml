name: Blue/Green Deployment

# Deploys a new "green" VM alongside the currently-serving "blue" VM, wires
# both into the shared OCI Load Balancer via the teacher's reusable workflow
# (oci-lb-bluegreen-ab.yml), promotes green after health validation, and tears
# down the old blue VM.  On any failure the reusable workflow restores 100%
# traffic to blue; this workflow then destroys the green VM via Terraform.
#
# Pre-conditions (one-time setup):
#   gh variable set OCI_LB_OCID        --body "ocid1.loadbalancer..."
#   gh variable set OCI_LB_LINKER_BACKEND --body "linker-1"
#   gh variable set TF_COMPARTMENT_ID  --body "ocid1.compartment..."
#   gh variable set TF_SUBNET_ID       --body "ocid1.subnet..."  # = OCI_LINKER_SUBNET_OCID from linker.env
#   gh variable set TF_IMAGE_ID        --body "ocid1.image..."
#   gh variable set OCI_INSTANCE_OCID  --body "<current-blue-vm-ocid>"  # updated automatically on each successful deploy
#   gh secret  set TF_SSH_PUBLIC_KEY   < ~/.ssh/linker_deploy.pub       # or reuse DEPLOYMENT_PUBLIC_KEY
#
# All other secrets/variables (OCI_CLI_*, LD_SDK_KEY, MYSQL_*, OTEL_*) are
# already configured for pipeline.yml and are reused here without changes.

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialise blue/green runs on the same branch — never cancel mid-deploy.
concurrency:
  group: bluegreen-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# ─── shared OCI CLI env (consumed by oracle-actions/run-oci-cli-command) ────
env:
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}

jobs:

  # ── 1. Build gate ──────────────────────────────────────────────────────────
  # Fail fast: if the build is broken, don't waste an OCI VM.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify build compiles and packages
        run: mvn -B -ntp package -DskipTests

  # ── 2. Provision green VM ─────────────────────────────────────────────────
  # Creates a brand-new OCI VM (green) using the existing infra/main.tf.
  # The blue VM is not touched.  cloud-init clones the repo and starts the
  # service; the LB health-check wait in the next job covers that warm-up.
  provision-green:
    name: Provision green VM
    needs: build
    runs-on: ubuntu-latest
    outputs:
      green-instance-id: ${{ steps.tf-output.outputs.instance_id }}
    env:
      # Terraform variables — mapped from existing repo secrets/vars.
      TF_VAR_region:                       ${{ vars.OCI_CLI_REGION || 'sa-bogota-1' }}
      # OCI provider auth passed explicitly so no ~/.oci/config is needed on the runner.
      TF_VAR_tenancy_ocid:                 ${{ secrets.OCI_CLI_TENANCY }}
      TF_VAR_user_ocid:                    ${{ secrets.OCI_CLI_USER }}
      TF_VAR_fingerprint:                  ${{ secrets.OCI_CLI_FINGERPRINT }}
      TF_VAR_private_key:                  ${{ secrets.OCI_CLI_KEY_CONTENT }}
      TF_VAR_compartment_id:               ${{ vars.TF_COMPARTMENT_ID }}
      TF_VAR_subnet_id:                    ${{ vars.TF_SUBNET_ID }}
      TF_VAR_image_id:                     ${{ vars.TF_IMAGE_ID }}
      TF_VAR_ssh_public_key:               ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      TF_VAR_ld_sdk_key:                   ${{ secrets.LD_SDK_KEY }}
      TF_VAR_otel_exporter_otlp_endpoint:  ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      TF_VAR_otel_exporter_otlp_headers:   ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      TF_VAR_mysql_host:                   ${{ vars.MYSQL_HOST }}
      TF_VAR_mysql_database:               ${{ vars.MYSQL_DATABASE }}
      TF_VAR_mysql_user:                   ${{ vars.MYSQL_USER }}
      TF_VAR_mysql_pwd:                    ${{ secrets.MYSQL_PWD }}
      # Unique display name scoped to this workflow run so retries don't clash.
      TF_VAR_instance_display_name:        vm-linker1-green-${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # Disable the wrapper so `terraform output -raw` returns a plain string.
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform apply — create green VM
        working-directory: infra
        # infra/main.tf provisions a single oci_core_instance with the name
        # set by TF_VAR_instance_display_name (set above).  This state file is
        # independent of any previous blue-VM state; it only knows about the
        # green VM it just created.
        run: terraform apply -auto-approve -input=false

      - name: Capture green VM OCID
        id: tf-output
        working-directory: infra
        run: echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"

      - name: Upload Terraform state for failure cleanup
        uses: actions/upload-artifact@v4
        with:
          name: green-tf-state-${{ github.run_id }}
          path: infra/terraform.tfstate
          # Retain long enough to cover any manual cleanup window.
          retention-days: 7

  # ── 3. Functional tests against the ephemeral green VM ───────────────────
  # The green VM is the "entorno efímero de pruebas" (#72): it only earns
  # real traffic if it passes. This runs the k6 suite directly against the
  # VM's private IP:port -- not through the load balancer -- so it exercises
  # the app itself, not just "does something answer on this port" (which is
  # all the LB's own health check proves). A failure here is the same
  # severity as a failed health check: it blocks the LB deploy entirely and
  # the green VM gets destroyed (job 4b) without ever receiving production
  # traffic.
  functional-test-green:
    name: Functional tests on green VM
    needs: provision-green
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -sSL https://github.com/grafana/k6/releases/download/v1.0.0/k6-v1.0.0-linux-amd64.tar.gz \
            | tar xz --strip-components 1 -C /usr/local/bin k6-v1.0.0-linux-amd64/k6

      - name: Prime OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: '--version'
          silent: 'true'

      # The green VM has no public IP (create_vnic_details.assign_public_ip
      # = false in infra/main.tf), so this GitHub-hosted runner can't reach
      # it directly. Opens the same kind of Bastion managed-SSH session used
      # for deploys (actions/oci-bastion-deploy's create-managed-ssh call),
      # then reuses its returned ssh-metadata.command as a local port-forward
      # (-L) instead of an interactive shell -- k6 itself still runs here on
      # the runner against localhost:18080, so `k6 run --out cloud` can also
      # reach Grafana Cloud k6 to publish results. Tunnel and session are
      # both self-contained to this one step so their lifetime can't leak
      # into other steps or jobs.
      - name: Run functional tests against green VM (via Bastion tunnel)
        env:
          DEPLOYMENT_PUBLIC_KEY:  ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
          DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
          OCI_BASTION_OCID:       ${{ vars.OCI_BASTION_OCID }}
          TARGET_INSTANCE_ID:     ${{ needs.provision-green.outputs.green-instance-id }}
          K6_CLOUD_TOKEN:         ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID:    ${{ vars.K6_CLOUD_PROJECT_ID }}
        run: |
          set -euo pipefail

          work_dir="$(mktemp -d)"
          pub_key="$work_dir/session.pub"
          priv_key="$work_dir/session.key"
          printf '%s\n' "$DEPLOYMENT_PUBLIC_KEY" > "$pub_key"
          printf '%s\n' "$DEPLOYMENT_PRIVATE_KEY" > "$priv_key"
          chmod 600 "$priv_key"

          session_id="$(oci bastion session create-managed-ssh \
            --bastion-id "$OCI_BASTION_OCID" \
            --ssh-public-key-file "$pub_key" \
            --target-resource-id "$TARGET_INSTANCE_ID" \
            --target-os-username ubuntu \
            --target-port 22 \
            --key-type PUB \
            --session-ttl 1800 \
            --wait-for-state SUCCEEDED \
            --wait-interval-seconds 10 \
            --query 'data.resources[?"entity-type"==`SessionResource` && "action-type"==`CREATED`].identifier | [0]' \
            --raw-output)"
          echo "Bastion session: $session_id"
          trap 'oci bastion session delete --session-id "$session_id" --force || true' EXIT

          # ssh-metadata.command looks like:
          #   ssh -i <privateKey> -o ProxyCommand="ssh ... -W %h:%p -p 22 <session>@host.bastion.<region>.oci.oraclecloud.com" -p 22 -o ... ubuntu@10.x.x.x
          # Substitute the real key path for the literal "<privateKey>" token
          # and reuse the command verbatim rather than re-deriving the
          # Bastion hostname/session-user format ourselves.
          ssh_command="$(oci bastion session get --session-id "$session_id" \
            --query 'data."ssh-metadata".command' --raw-output)"
          ssh_command="${ssh_command//<privateKey>/$priv_key}"

          # Turn the interactive command into a backgrounded local tunnel:
          # -N (no remote command) + -L (forward 18080 -> green VM's 8080).
          eval "$ssh_command -N -L 18080:localhost:8080 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$work_dir/known_hosts &"
          tunnel_pid=$!
          trap 'kill "$tunnel_pid" 2>/dev/null || true; oci bastion session delete --session-id "$session_id" --force || true' EXIT

          for i in $(seq 1 20); do
            curl -sf http://localhost:18080/ > /dev/null 2>&1 && break
            sleep 3
          done

          if [ -n "${K6_CLOUD_TOKEN:-}" ] && [ -n "${K6_CLOUD_PROJECT_ID:-}" ]; then
            TARGET_URL=http://localhost:18080 k6 run --out cloud tests/k6/switchover-checks.js
          else
            echo "::warning::K6_CLOUD_TOKEN/K6_CLOUD_PROJECT_ID not set -- running k6 locally only, results won't appear in Grafana Cloud (see docs/DEPLOYMENT.md)."
            TARGET_URL=http://localhost:18080 k6 run tests/k6/switchover-checks.js
          fi

  # ── 4. Blue/green LB deploy ────────────────────────────────────────────────
  # Delegates the full blue/green + A/B lifecycle to the teacher's reusable
  # workflow.  Job sequence inside the callee:
  #   preflight → stage_green_backend (drain=true) → verify_green_health
  #   → start_ab_test (90/10) → observe_ab_test (60 s) → verify_ab_health
  #   → promote_green (100/0) → deployment_result
  # On any step failure the callee runs its own rollback/cleanup jobs before
  # surfacing a failed result here.
  blue-green-lb-deploy:
    name: Blue/green LB deploy
    needs: [provision-green, functional-test-green]
    # Vendored locally (.github/workflows/oci-lb-bluegreen-ab.yml) instead of
    # `uses: co-eiv-devsecops/material-curso/...@main` -- the org restricted
    # cross-repo Actions access to material-curso sometime after 2026-07-11,
    # which broke every workflow depending on it ("Unable to resolve action").
    # See docs/DEPLOYMENT.md for details.
    uses: ./.github/workflows/oci-lb-bluegreen-ab.yml
    with:
      deployment-scenario: deploy
      load-balancer-id:    ${{ vars.OCI_LB_OCID }}
      backend-set-name:    ${{ vars.OCI_LB_LINKER_BACKEND }}
      new-instance-id:     ${{ needs.provision-green.outputs.green-instance-id }}
      current-instance-id: ${{ vars.OCI_INSTANCE_OCID }}
      # The shared LB's linker-1 backend set is configured with health-checker
      # port 8080 and url-path "/" (verified via `oci lb backend-set get`).
      # Backends must be registered on 8080 to match -- the reusable workflow's
      # default backend-port is '80', which puts traffic on a different port
      # than the health checker probes. The preflight job validates that
      # health-check-path matches the LB's actual configured path, so this must
      # be "/" (the app's own /healthz stays as the Grafana synthetic check;
      # keeping the LB check on "/" also avoids coupling LB health to MySQL).
      backend-port:        '8080'
      health-check-path:   /
      # cloud-init clones the repo and runs mvn clean package before the service
      # starts.  Allow up to 20 min (40 × 30 s) for the OCI LB to report OK.
      health-wait-attempts: '40'
      health-wait-seconds:  '30'
      # Promote automatically after the A/B window — no manual intervention needed.
      auto-promote:          true
      ab-observation-seconds: '60'
      # Remove the green backend from the LB if the reusable workflow rolls back,
      # keeping the backend set clean for the next deploy attempt.
      remove-new-on-rollback: true
    secrets: inherit

  # ── 4a. Tear down blue VM on success ──────────────────────────────────────
  # After green is promoted (100% traffic), the old blue VM is terminated and
  # OCI_INSTANCE_OCID is updated to point at the new green VM so the next
  # deploy cycle knows which instance is "current".
  teardown-blue-on-success:
    name: Retire blue VM
    needs: [provision-green, blue-green-lb-deploy]
    if: ${{ always() && needs.blue-green-lb-deploy.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # actions: write is required for GITHUB_TOKEN to update repository variables.
      actions: write
    env:
      # Captured at job start, BEFORE the variable is repointed at green below,
      # so the terminate step can't accidentally target the new VM.
      BLUE_OCID: ${{ vars.OCI_INSTANCE_OCID }}
      GREEN_OCID: ${{ needs.provision-green.outputs.green-instance-id }}
    steps:
      # Runs FIRST: the LB has already promoted green to 100%, so the next
      # deploy must treat green as "current" regardless of whether the old
      # blue VM terminates cleanly below.
      - name: Promote OCI_INSTANCE_OCID to green VM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          if gh variable set OCI_INSTANCE_OCID --body "$GREEN_OCID" --repo "${{ github.repository }}"; then
            echo "OCI_INSTANCE_OCID updated to green VM: $GREEN_OCID"
          else
            # The org disables workflow-token variable writes repo-wide
            # ("Resource not accessible by integration" -- see
            # docs/DEPLOYMENT.md). The deploy itself already succeeded, so
            # surface the required manual step loudly instead of failing the
            # whole job over bookkeeping.
            echo "::warning::Could not update OCI_INSTANCE_OCID (org policy blocks GITHUB_TOKEN variable writes). Run manually: gh variable set OCI_INSTANCE_OCID --body \"$GREEN_OCID\""
          fi

      # Installs the OCI CLI so the bash step below can call `oci` directly.
      - name: Prime OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: '--version'
          silent: 'true'

      # Plain bash instead of run-oci-cli-command: that action's silent mode
      # swallows the CLI's stderr, which turned a previous failure here into
      # an undebuggable bare "exit code 2". Termination is asynchronous on
      # OCI's side, so fire the request and confirm the instance is on its
      # way out instead of blocking up to 10 minutes for TERMINATED.
      - name: Terminate blue VM
        run: |
          set -euo pipefail
          state="$(oci compute instance get --instance-id "$BLUE_OCID" \
            --query 'data."lifecycle-state"' --raw-output 2>/dev/null || echo "NOT_FOUND")"
          echo "Blue VM $BLUE_OCID state: $state"
          case "$state" in
            TERMINATED|TERMINATING|NOT_FOUND)
              echo "Blue VM already retired; nothing to do."
              exit 0
              ;;
          esac
          oci compute instance terminate --instance-id "$BLUE_OCID" --force
          state="$(oci compute instance get --instance-id "$BLUE_OCID" \
            --query 'data."lifecycle-state"' --raw-output 2>/dev/null || echo "GONE")"
          echo "Blue VM state after terminate request: $state"

  # ── 4b. Tear down green VM on failure ─────────────────────────────────────
  # Covers two failure paths:
  #   1. functional-test-green fails -> blue-green-lb-deploy is skipped
  #      entirely (its `needs` never runs) -- the green VM never reaches the
  #      LB and needs cleanup here directly.
  #   2. blue-green-lb-deploy itself fails -- it already handled the LB side
  #      (rollback-to-current + remove-new-backend); this job just destroys
  #      the OCI compute instance so it doesn't keep accruing cost.
  # Either way the blue VM is untouched and continues serving 100% traffic.
  teardown-green-on-failure:
    name: Destroy green VM after failed deploy
    needs: [provision-green, functional-test-green, blue-green-lb-deploy]
    if: >-
      ${{ always() && needs.provision-green.result == 'success' &&
          (needs.functional-test-green.result == 'failure' || needs.blue-green-lb-deploy.result == 'failure') }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_region:                       ${{ vars.OCI_CLI_REGION || 'sa-bogota-1' }}
      TF_VAR_tenancy_ocid:                 ${{ secrets.OCI_CLI_TENANCY }}
      TF_VAR_user_ocid:                    ${{ secrets.OCI_CLI_USER }}
      TF_VAR_fingerprint:                  ${{ secrets.OCI_CLI_FINGERPRINT }}
      TF_VAR_private_key:                  ${{ secrets.OCI_CLI_KEY_CONTENT }}
      TF_VAR_compartment_id:               ${{ vars.TF_COMPARTMENT_ID }}
      TF_VAR_subnet_id:                    ${{ vars.TF_SUBNET_ID }}
      TF_VAR_image_id:                     ${{ vars.TF_IMAGE_ID }}
      TF_VAR_ssh_public_key:               ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      TF_VAR_ld_sdk_key:                   ${{ secrets.LD_SDK_KEY }}
      TF_VAR_otel_exporter_otlp_endpoint:  ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      TF_VAR_otel_exporter_otlp_headers:   ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      TF_VAR_mysql_host:                   ${{ vars.MYSQL_HOST }}
      TF_VAR_mysql_database:               ${{ vars.MYSQL_DATABASE }}
      TF_VAR_mysql_user:                   ${{ vars.MYSQL_USER }}
      TF_VAR_mysql_pwd:                    ${{ secrets.MYSQL_PWD }}
      TF_VAR_instance_display_name:        vm-linker1-green-${{ github.run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download green VM Terraform state
        uses: actions/download-artifact@v4
        with:
          name: green-tf-state-${{ github.run_id }}
          # Places terraform.tfstate into infra/ so `terraform destroy` finds it.
          path: infra/

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform destroy — delete green VM
        working-directory: infra
        run: terraform destroy -auto-approve -input=false
