name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing SemVer tag (example: v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Use the format vMAJOR.MINOR.PATCH (example: v1.2.3)"
            exit 1
          fi

          git fetch --tags --force
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG does not exist in the repository."
            echo "Create and push the tag first (git tag $TAG ; git push origin $TAG)."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify quality gates
        run: mvn -B -ntp clean verify

      - name: Build release package
        run: mvn -B -ntp package -DskipTests

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp target/linker1-1.0-jar-with-dependencies.jar release-assets/linker1-1.0-jar-with-dependencies.jar
          cp scripts/linker1 release-assets/linker1
          chmod +x release-assets/linker1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Linker1 ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/linker1-1.0-jar-with-dependencies.jar
            release-assets/linker1
